<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1350" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1350" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">verifier.ts — Logic Flow</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#64748b">Step 1.3 — Payment Signature Verification</text>

  <!-- Legend -->
  <rect x="40" y="72" width="820" height="38" rx="6" fill="#fff" stroke="#e2e8f0"/>
  <rect x="56" y="82" width="16" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="80" y="94" font-size="10" fill="#334155">Our gateway logic</text>
  <rect x="210" y="82" width="16" height="16" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="234" y="94" font-size="10" fill="#334155">@x402/evm types &amp; constants</text>
  <rect x="410" y="82" width="16" height="16" rx="3" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="434" y="94" font-size="10" fill="#334155">ethers.js crypto</text>
  <rect x="580" y="82" width="16" height="16" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="604" y="94" font-size="10" fill="#334155">Injectable deps (ChainReader / StateStore)</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ENTRY POINT -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="290" y="128" width="320" height="40" rx="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">verifyPayment( payload, store, reader, cfg )</text>

  <!-- Arrow down -->
  <line x1="450" y1="168" x2="450" y2="192" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 1: Lookup state -->
  <rect x="290" y="194" width="320" height="36" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="216" text-anchor="middle" font-size="11" fill="#166534">① store.get( depositAddress )</text>

  <line x1="450" y1="230" x2="450" y2="252" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 2: Phase check -->
  <path d="M450,254 L530,282 L450,310 L370,282 Z" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="450" y="286" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">phase?</text>

  <!-- QUOTED → continue -->
  <line x1="450" y1="310" x2="450" y2="338" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="458" y="328" font-size="9" fill="#16a34a" font-weight="600">QUOTED</text>

  <!-- SETTLED → cached success (right) -->
  <line x1="530" y1="282" x2="700" y2="282" stroke="#16a34a" marker-end="url(#arrow-green)"/>
  <rect x="702" y="268" width="140" height="28" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <text x="772" y="286" text-anchor="middle" font-size="9" fill="#166534">return cached success</text>
  <text x="640" y="276" font-size="9" fill="#16a34a">SETTLED</text>

  <!-- FAILED/EXPIRED → reject (left) -->
  <line x1="370" y1="282" x2="180" y2="282" stroke="#dc2626" marker-end="url(#arrow-red)"/>
  <rect x="50" y="268" width="128" height="28" rx="5" fill="#fee2e2" stroke="#dc2626"/>
  <text x="114" y="286" text-anchor="middle" font-size="9" fill="#991b1b">reject: terminal state</text>
  <text x="262" y="276" font-size="9" fill="#dc2626">FAILED / EXPIRED / in-progress</text>

  <!-- Step 3: Deadline check -->
  <rect x="310" y="340" width="280" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="450" y="356" text-anchor="middle" font-size="10" fill="#1e40af">③ Check quote deadline not expired</text>
  <text x="450" y="369" text-anchor="middle" font-size="9" fill="#64748b">if expired → store.update(EXPIRED), reject</text>

  <line x1="450" y1="376" x2="450" y2="400" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 4: Requirements match -->
  <rect x="290" y="402" width="320" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="450" y="418" text-anchor="middle" font-size="10" fill="#1e40af">④ validateRequirementsMatch()</text>
  <text x="450" y="431" text-anchor="middle" font-size="9" fill="#64748b">scheme, network, asset, payTo, amount</text>

  <line x1="450" y1="438" x2="450" y2="462" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Step 5: Route by payload type -->
  <path d="M450,464 L560,498 L450,532 L340,498 Z" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="450" y="495" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">isEIP3009Payload?</text>
  <text x="450" y="507" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">isPermit2Payload?</text>
  <text x="450" y="520" text-anchor="middle" font-size="8" fill="#a16207">@x402/evm type guards</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- LEFT BRANCH: EIP-3009 -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <line x1="340" y1="498" x2="190" y2="498" stroke="#475569"/>
  <line x1="190" y1="498" x2="190" y2="538" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="260" y="492" font-size="10" fill="#1e40af" font-weight="600">EIP-3009</text>

  <!-- EIP-3009 container -->
  <rect x="48" y="540" width="285" height="370" rx="8" fill="#fff" stroke="#93c5fd" stroke-dasharray="4,3" opacity="0.9"/>
  <text x="190" y="560" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">verifyEIP3009()</text>

  <!-- field checks -->
  <rect x="62" y="572" width="256" height="56" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="190" y="589" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Field validation</text>
  <text x="190" y="602" text-anchor="middle" font-size="9" fill="#475569">auth.to == payTo (deposit addr)</text>
  <text x="190" y="614" text-anchor="middle" font-size="9" fill="#475569">auth.value ≥ amount · time bounds</text>

  <!-- EIP-712 domain -->
  <rect x="62" y="636" width="256" height="42" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="190" y="653" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Build EIP-712 domain</text>
  <text x="190" y="666" text-anchor="middle" font-size="9" fill="#a16207">authorizationTypes from @x402/evm</text>

  <!-- ethers verify -->
  <rect x="62" y="686" width="256" height="42" rx="5" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="190" y="703" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">ethers.verifyTypedData()</text>
  <text x="190" y="716" text-anchor="middle" font-size="9" fill="#7e22ce">recover signer → compare to auth.from</text>

  <!-- on-chain balance -->
  <rect x="62" y="736" width="256" height="42" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="753" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">chainReader.readContract()</text>
  <text x="190" y="766" text-anchor="middle" font-size="9" fill="#15803d">balanceOf — optional, non-fatal</text>

  <!-- result -->
  <rect x="98" y="790" width="185" height="32" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="190" y="810" text-anchor="middle" font-size="10" fill="#1e40af">{ valid, signerAddress }</text>

  <!-- Arrows inside EIP-3009 box -->
  <line x1="190" y1="628" x2="190" y2="636" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="190" y1="678" x2="190" y2="686" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="190" y1="728" x2="190" y2="736" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="190" y1="778" x2="190" y2="790" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- RIGHT BRANCH: Permit2 -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <line x1="560" y1="498" x2="710" y2="498" stroke="#475569"/>
  <line x1="710" y1="498" x2="710" y2="538" stroke="#475569" marker-end="url(#arrow)"/>
  <text x="640" y="492" font-size="10" fill="#1e40af" font-weight="600">Permit2</text>

  <!-- Permit2 container -->
  <rect x="568" y="540" width="285" height="420" rx="8" fill="#fff" stroke="#93c5fd" stroke-dasharray="4,3" opacity="0.9"/>
  <text x="710" y="560" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">verifyPermit2()</text>

  <!-- field checks -->
  <rect x="582" y="572" width="256" height="68" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="710" y="589" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Field validation</text>
  <text x="710" y="602" text-anchor="middle" font-size="9" fill="#475569">spender == x402Permit2ProxyAddr</text>
  <text x="710" y="614" text-anchor="middle" font-size="9" fill="#475569">token == asset · witness.to == payTo</text>
  <text x="710" y="626" text-anchor="middle" font-size="9" fill="#475569">amount ≥ required · deadline &amp; validAfter</text>

  <!-- EIP-712 domain -->
  <rect x="582" y="648" width="256" height="42" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="710" y="665" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Build Permit2 EIP-712 domain</text>
  <text x="710" y="678" text-anchor="middle" font-size="9" fill="#a16207">permit2WitnessTypes, PERMIT2_ADDRESS</text>

  <!-- ethers verify -->
  <rect x="582" y="698" width="256" height="42" rx="5" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="710" y="715" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">ethers.verifyTypedData()</text>
  <text x="710" y="728" text-anchor="middle" font-size="9" fill="#7e22ce">recover signer → compare to p2auth.from</text>

  <!-- on-chain checks -->
  <rect x="582" y="748" width="256" height="56" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <text x="710" y="765" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">chainReader.readContract()</text>
  <text x="710" y="778" text-anchor="middle" font-size="9" fill="#15803d">balanceOf — optional, non-fatal</text>
  <text x="710" y="790" text-anchor="middle" font-size="9" fill="#15803d">allowance(owner, PERMIT2) — optional</text>

  <!-- result -->
  <rect x="618" y="816" width="185" height="32" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="710" y="836" text-anchor="middle" font-size="10" fill="#1e40af">{ valid, signerAddress }</text>

  <!-- Arrows inside Permit2 box -->
  <line x1="710" y1="640" x2="710" y2="648" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="710" y1="690" x2="710" y2="698" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="710" y1="740" x2="710" y2="748" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="710" y1="804" x2="710" y2="816" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- CONVERGENCE: State update -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <line x1="190" y1="822" x2="190" y2="996" stroke="#475569"/>
  <line x1="190" y1="996" x2="450" y2="996" stroke="#475569"/>
  <line x1="710" y1="848" x2="710" y2="996" stroke="#475569"/>
  <line x1="710" y1="996" x2="450" y2="996" stroke="#475569"/>
  <line x1="450" y1="996" x2="450" y2="1016" stroke="#475569" marker-end="url(#arrow)"/>

  <!-- Final decision -->
  <path d="M450,1018 L540,1048 L450,1078 L360,1048 Z" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="450" y="1052" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">valid?</text>

  <!-- Success path -->
  <line x1="450" y1="1078" x2="450" y2="1108" stroke="#16a34a" marker-end="url(#arrow-green)"/>
  <text x="464" y="1098" font-size="9" fill="#16a34a" font-weight="600">yes</text>

  <rect x="290" y="1110" width="320" height="36" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="1126" text-anchor="middle" font-size="10" fill="#166534">⑥ store.update( VERIFIED,</text>
  <text x="450" y="1139" text-anchor="middle" font-size="10" fill="#166534">{ paymentPayload, signerAddress } )</text>

  <line x1="450" y1="1146" x2="450" y2="1174" stroke="#16a34a" marker-end="url(#arrow-green)"/>

  <!-- Final success -->
  <rect x="330" y="1176" width="240" height="36" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="1199" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">✓ { valid: true, signerAddress }</text>

  <!-- Failure path -->
  <line x1="540" y1="1048" x2="750" y2="1048" stroke="#dc2626" marker-end="url(#arrow-red)"/>
  <text x="620" y="1042" font-size="9" fill="#dc2626" font-weight="600">no</text>

  <rect x="678" y="1032" width="180" height="32" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="768" y="1052" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">✗ { valid: false, error }</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- Dependency annotations -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="40" y="1240" width="820" height="90" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="450" y="1262" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Dependency Breakdown</text>

  <rect x="58" y="1274" width="10" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="76" y="1284" font-size="10" fill="#334155"><tspan font-weight="600">Our code:</tspan> verifyPayment, verifyEIP3009, verifyPermit2, validateRequirementsMatch, extractChainId</text>

  <rect x="58" y="1292" width="10" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="76" y="1302" font-size="10" fill="#334155"><tspan font-weight="600">@x402/evm:</tspan> isEIP3009Payload, isPermit2Payload, authorizationTypes, permit2WitnessTypes, PERMIT2_ADDRESS, ABIs</text>

  <rect x="58" y="1310" width="10" height="10" rx="2" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="76" y="1320" font-size="10" fill="#334155"><tspan font-weight="600">ethers.js:</tspan> verifyTypedData (EIP-712 signature recovery), Contract (on-chain reads)</text>
</svg>
